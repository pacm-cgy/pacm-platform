name: Insightship 뉴스 자동 수집·정리·AI요약 (매 6시간)

on:
  schedule:
    - cron: '0 */6 * * *'   # 매 6시간마다
  workflow_dispatch:
    inputs:
      action:
        description: '작업 선택'
        required: true
        default: 'full'
        type: choice
        options: [fetch, cleanup, summarize, full]

jobs:
  news-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: "🗑️ [정리] 3일 초과 뉴스 삭제 (3일 이내만 유지)"
        if: ${{ github.event.inputs.action != 'fetch' && github.event.inputs.action != 'summarize' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, time

          SB_URL = os.environ.get('SUPABASE_URL', '')
          SB_KEY = os.environ.get('SUPABASE_SERVICE_KEY', '')
          if not SB_URL or not SB_KEY:
              print("⚠️  Supabase 환경변수 없음")
              exit(0)

          H = {'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}',
               'Content-Type': 'application/json'}

          # 3일 전 날짜 계산
          cutoff = time.strftime('%Y-%m-%dT00:00:00Z',
                                  time.gmtime(time.time() - 3 * 86400))
          print(f"삭제 기준일: {cutoff} 이전 기사")

          # 삭제 대상 수 확인
          count_url = (f"{SB_URL}/rest/v1/articles"
                       f"?published_at=lt.{cutoff}&select=id")
          req = urllib.request.Request(count_url, headers={**H, 'Prefer': 'count=exact'})
          req.method = 'HEAD'
          try:
              with urllib.request.urlopen(req) as r:
                  cr = r.headers.get('Content-Range', '0')
                  total = int(cr.split('/')[-1]) if '/' in cr else 0
                  print(f"삭제 대상: {total}건")
          except Exception as e:
              print(f"카운트 오류: {e}")
              total = 0

          if total == 0:
              print("삭제할 기사 없음")
              exit(0)

          # 배치 삭제 (500건씩)
          deleted = 0
          for batch in range(0, min(total, 5000), 500):
              del_url = (f"{SB_URL}/rest/v1/articles"
                         f"?published_at=lt.{cutoff}"
                         f"&id=gt.0")
              req = urllib.request.Request(
                  del_url + f"&limit=500",
                  headers={**H, 'Prefer': 'return=minimal'},
                  method='DELETE'
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      deleted += 500
                      print(f"  삭제 중: {deleted}/{total}")
              except Exception as e:
                  print(f"  삭제 오류: {e}")
                  break

          print(f"✅ 삭제 완료: 약 {deleted}건")
          EOF

      - name: "📡 [수집] 최신 뉴스 수집 (네이버 API)"
        if: ${{ github.event.inputs.action != 'cleanup' && github.event.inputs.action != 'summarize' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          NAVER_CLIENT_ID: ${{ vars.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ vars.NAVER_CLIENT_SECRET }}
        run: |
          python3 - <<'EOF'
          import urllib.request, urllib.parse, json, os, time, re, html

          SB_URL = os.environ.get('SUPABASE_URL', '')
          SB_KEY = os.environ.get('SUPABASE_SERVICE_KEY', '')
          NAV_ID = os.environ.get('NAVER_CLIENT_ID', '')
          NAV_SEC = os.environ.get('NAVER_CLIENT_SECRET', '')

          if not all([SB_URL, SB_KEY, NAV_ID, NAV_SEC]):
              print("⚠️  환경변수 부족 — 수집 스킵")
              exit(0)

          H_SB = {'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}',
                  'Content-Type': 'application/json'}
          H_NAV = {'X-Naver-Client-Id': NAV_ID, 'X-Naver-Client-Secret': NAV_SEC}

          KEYWORDS = [
              ('청소년 창업', '청소년창업'),
              ('스타트업 투자 유치', '투자'),
              ('AI 스타트업', 'AI스타트업'),
              ('창업 지원 정책', '창업지원'),
              ('유니콘 스타트업', '유니콘'),
              ('청년 창업가', '청년창업'),
              ('스타트업 시리즈A', '투자'),
              ('에듀테크 스타트업', '에듀테크'),
              ('핀테크 스타트업', '핀테크'),
              ('소셜벤처 ESG', 'ESG'),
              ('창업 성공 사례', '성공사례'),
              ('딥테크 스타트업', '딥테크'),
          ]

          def strip_html(s):
              return re.sub(r'<[^>]+>', '', html.unescape(s or '')).strip()

          def make_slug():
              import random, string
              return ''.join(random.choices(string.ascii_lowercase + string.digits, k=10))

          inserted = skipped = 0

          for keyword, tag in KEYWORDS:
              try:
                  enc = urllib.parse.quote(keyword)
                  url = f"https://openapi.naver.com/v1/search/news.json?query={enc}&display=5&sort=date"
                  req = urllib.request.Request(url, headers=H_NAV)
                  with urllib.request.urlopen(req, timeout=8) as resp:
                      data = json.load(resp)

                  for item in data.get('items', []):
                      link = item.get('originallink') or item.get('link', '')
                      if not link.startswith('http'):
                          continue

                      title = strip_html(item.get('title', ''))[:200]
                      desc = strip_html(item.get('description', ''))[:400]

                      # 중복 확인
                      check_url = (f"{SB_URL}/rest/v1/articles"
                                   f"?source_url=eq.{urllib.parse.quote(link)}&select=id&limit=1")
                      check_req = urllib.request.Request(check_url, headers=H_SB)
                      with urllib.request.urlopen(check_req) as cr:
                          existing = json.load(cr)
                      if existing:
                          skipped += 1
                          continue

                      try:
                          pub_iso = time.strftime('%Y-%m-%dT%H:%M:%SZ',
                                                  time.strptime(item.get('pubDate', ''),
                                                                '%a, %d %b %Y %H:%M:%S +0900'))
                      except:
                          pub_iso = time.strftime('%Y-%m-%dT%H:%M:%SZ')

                      try:
                          host = urllib.parse.urlparse(link).hostname or '뉴스'
                          host = host.replace('www.', '')[:30]
                      except:
                          host = '뉴스'

                      article = {
                          'title': title,
                          'slug': make_slug(),
                          'excerpt': desc or title,
                          'body': desc or title,
                          'category': 'news',
                          'status': 'published',
                          'read_time': 2,
                          'source_name': host,
                          'source_url': link,
                          'published_at': pub_iso,
                          'tags': ['뉴스', tag],
                          'featured': False,
                      }

                      save_req = urllib.request.Request(
                          f"{SB_URL}/rest/v1/articles",
                          data=json.dumps(article).encode(),
                          headers={**H_SB, 'Prefer': 'return=minimal'},
                          method='POST'
                      )
                      try:
                          with urllib.request.urlopen(save_req) as sr:
                              if sr.status == 201:
                                  inserted += 1
                              else:
                                  skipped += 1
                      except urllib.error.HTTPError as e:
                          err = e.read().decode()[:80]
                          if '23505' not in err:
                              print(f"  저장 오류: {err}")
                          skipped += 1

                  time.sleep(0.3)  # API 레이트 리밋 방지

              except Exception as e:
                  print(f"  키워드 '{keyword}' 오류: {e}")

          print(f"✅ 수집 완료: 신규 {inserted}건, 스킵 {skipped}건")
          EOF

      - name: "🧠 [AI v5] 미처리 기사 전체 요약 처리"
        if: ${{ github.event.inputs.action != 'fetch' && github.event.inputs.action != 'cleanup' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/insightship_ai_v5.py process

      - name: "📊 수집 결과 요약"
        run: |
          echo "✅ 뉴스 파이프라인 완료: $(date '+%Y-%m-%d %H:%M KST')"
