name: Insightship 뉴스 자동 수집·스크래핑·AI v7 교육 콘텐츠 생성 (매 6시간)

on:
  schedule:
    - cron: '0 */6 * * *'   # 매 6시간마다
  workflow_dispatch:
    inputs:
      action:
        description: '작업 선택'
        required: true
        default: 'full'
        type: choice
        options: [fetch, scrape, summarize, cleanup, full, reprocess]

jobs:
  news-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: "🗑️ [정리] 3일 초과 뉴스 삭제"
        if: ${{ github.event.inputs.action == 'cleanup' || github.event.inputs.action == 'full' || github.event.inputs.action == '' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, time

          SB_URL = os.environ.get('SUPABASE_URL', '')
          SB_KEY = os.environ.get('SUPABASE_SERVICE_KEY', '')
          if not SB_URL or not SB_KEY:
              print("⚠️  Supabase 환경변수 없음")
              exit(0)

          H = {'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}',
               'Content-Type': 'application/json'}

          cutoff = time.strftime('%Y-%m-%dT00:00:00Z', time.gmtime(time.time() - 3 * 86400))
          print(f"삭제 기준일: {cutoff} 이전 기사")

          del_url = f"{SB_URL}/rest/v1/articles?published_at=lt.{cutoff}&source_name=not.is.null&id=gt.0"
          req = urllib.request.Request(del_url, headers={**H, 'Prefer': 'return=minimal'})
          req.method = 'DELETE'
          try:
              with urllib.request.urlopen(req) as r:
                  print(f"✅ 오래된 기사 삭제 완료")
          except Exception as e:
              print(f"삭제 오류: {e}")
          EOF

      - name: "📡 [수집] 최신 뉴스 수집 (Google News RSS)"
        if: ${{ github.event.inputs.action == 'fetch' || github.event.inputs.action == 'full' || github.event.inputs.action == '' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PROFILE_ID: ${{ vars.ADMIN_PROFILE_ID }}
        run: |
          echo "=== 뉴스 수집 시작 $(date '+%H:%M:%S') ==="
          python3 scripts/collect_news.py
          echo "=== 수집 완료 $(date '+%H:%M:%S') ==="

      - name: "🔍 [스크래핑] 원문 본문 추출 (URL → body 저장)"
        if: ${{ github.event.inputs.action == 'scrape' || github.event.inputs.action == 'full' || github.event.inputs.action == '' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=== 본문 스크래핑 시작 $(date '+%H:%M:%S') ==="
          python3 scripts/scrape_body.py
          echo "=== 스크래핑 완료 $(date '+%H:%M:%S') ==="

      - name: "🧠 [AI v7] 교육 콘텐츠 생성 (미처리 기사)"
        if: ${{ github.event.inputs.action == 'summarize' || github.event.inputs.action == 'full' || github.event.inputs.action == '' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=== AI v7 교육 콘텐츠 생성 시작 $(date '+%H:%M:%S') ==="
          python3 scripts/insightship_ai_v7.py process
          echo "=== 완료 $(date '+%H:%M:%S') ==="

      - name: "🔄 [재처리] 전체 기사 v7로 재생성"
        if: ${{ github.event.inputs.action == 'reprocess' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=== AI v7 전체 재처리 시작 $(date '+%H:%M:%S') ==="
          python3 scripts/insightship_ai_v7.py reprocess
          echo "=== 재처리 완료 $(date '+%H:%M:%S') ==="

      - name: "📊 파이프라인 완료"
        run: |
          echo "✅ Insightship 뉴스 파이프라인 완료: $(date '+%Y-%m-%d %H:%M KST')"
