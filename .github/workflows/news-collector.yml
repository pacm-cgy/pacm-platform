name: 뉴스 수집+요약+트렌드 (매시간)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 뉴스 수집
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PROFILE_ID: ${{ vars.ADMIN_PROFILE_ID }}
        run: |
          echo "=== [1/3] 뉴스 수집 시작 $(date '+%H:%M:%S') ==="
          python3 scripts/collect_news.py
          echo "=== 수집 완료 $(date '+%H:%M:%S') ==="

      - name: AI 요약 처리 (최대 3라운드, 조기종료)
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ vars.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ vars.GEMINI_API_KEY }}
          BATCH_SIZE: "80"
          MAX_WORKERS: "20"
        run: |
          echo "=== [2/3] AI 요약 시작 $(date '+%H:%M:%S') ==="
          for i in 1 2 3; do
            echo "--- 라운드 $i/3 ---"
            python3 scripts/bulk_summarize.py
            REMAINING=$(python3 scripts/check_remaining.py 2>/dev/null || echo "0")
            echo "남은 null: $REMAINING"
            if [ "$REMAINING" = "0" ]; then
              echo "✅ 모든 요약 완료 (라운드 $i 조기종료)"
              break
            fi
            sleep 2
          done
          echo "=== 요약 완료 $(date '+%H:%M:%S') ==="

      - name: 트렌드 업데이트
        env:
          CRON_SECRET: ${{ vars.CRON_SECRET }}
          SITE_URL: "https://www.insightship.pacm.kr"
        run: |
          echo "=== [3/3] 트렌드 업데이트 ==="
          python3 scripts/update_trends.py 2>/dev/null || echo "트렌드 업데이트 스킵"
          echo "=== 완료 $(date '+%H:%M:%S') ==="
