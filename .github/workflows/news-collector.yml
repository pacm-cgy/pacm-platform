name: 뉴스 자동 수집 (매시간)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: 뉴스 수집
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PROFILE_ID: ${{ vars.ADMIN_PROFILE_ID }}
        run: python3 scripts/collect_news.py

      - name: AI 요약 대량 처리 (60개 x 5라운드)
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ vars.GEMINI_API_KEY }}
          BATCH_SIZE: "60"
        run: |
          for i in 1 2 3 4 5; do
            echo "=== 요약 라운드 $i ==="
            python3 scripts/bulk_summarize.py
            sleep 2
          done
