name: 뉴스 수집 전용 (30분마다)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: 뉴스 수집 전용 (collect_news.py)
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PROFILE_ID: ${{ vars.ADMIN_PROFILE_ID }}
        run: |
          echo "=== 뉴스 수집 시작 ===" 
          python3 scripts/collect_news.py
          echo "=== 수집 완료 ==="
