name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_m7SNyydduLIrKv6yigVuoRnUZtUO/Vxu5ebhhcp" || true
          echo "Deploy triggered (hook may be expired - using direct API)"
