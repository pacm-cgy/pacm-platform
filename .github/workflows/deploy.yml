name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN }}
  VERCEL_ORG_ID: team_DJyDP6hZjv9D3y3BnW7W8sry
  VERCEL_PROJECT_ID: prj_m7SNyydduLIrKv6yigVuoRnUZtUO

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build (vercel build)
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt output
        run: |
          vercel deploy --prod --prebuilt --token=$VERCEL_TOKEN --yes
          echo "Done"

