name: AI 운영팀 공지글 게시

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '실행 확인 (yes 입력)'
        required: true
        default: 'no'
      notice_type:
        description: '공지 유형 (intro=팀소개, patch=패치노트, custom=직접입력)'
        required: false
        default: 'intro'
      custom_title:
        description: '커스텀 제목 (notice_type=custom 시 사용)'
        required: false
        default: ''
      custom_body:
        description: '커스텀 본문 (notice_type=custom 시 사용)'
        required: false
        default: ''
      is_pinned:
        description: '상단 고정 여부 (true/false)'
        required: false
        default: 'true'

jobs:
  post-notice:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: "📢 ARIA 공지글 게시"
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PROFILE_ID:     ${{ vars.ADMIN_PROFILE_ID }}
          NOTICE_TYPE:          ${{ github.event.inputs.notice_type }}
          CUSTOM_TITLE:         ${{ github.event.inputs.custom_title }}
          CUSTOM_BODY:          ${{ github.event.inputs.custom_body }}
          IS_PINNED:            ${{ github.event.inputs.is_pinned }}
        run: python3 scripts/post_notice.py
