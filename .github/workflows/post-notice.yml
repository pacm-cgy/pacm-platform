name: AI 운영팀 공지글 게시

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '실행 확인 (yes 입력)'
        required: true
        default: 'no'
      notice_type:
        description: '공지 유형 (intro=팀소개, patch=패치노트, custom=직접입력)'
        required: false
        default: 'intro'
      custom_title:
        description: '커스텀 제목 (notice_type=custom 시 사용)'
        required: false
        default: ''
      custom_body:
        description: '커스텀 본문 (notice_type=custom 시 사용)'
        required: false
        default: ''
      is_pinned:
        description: '상단 고정 여부 (true/false)'
        required: false
        default: 'true'

jobs:
  post-notice:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: "📢 ARIA 공지글 게시"
        env:
          SUPABASE_URL:       ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PROFILE_ID:   ${{ vars.ADMIN_PROFILE_ID }}
          NOTICE_TYPE:        ${{ github.event.inputs.notice_type }}
          CUSTOM_TITLE:       ${{ github.event.inputs.custom_title }}
          CUSTOM_BODY:        ${{ github.event.inputs.custom_body }}
          IS_PINNED:          ${{ github.event.inputs.is_pinned }}
        run: |
          python3 << 'PYEOF'
          import os, sys, json
          import urllib.request, urllib.error
          from datetime import datetime, timezone, timedelta

          SB_URL       = os.environ.get('SUPABASE_URL', '').rstrip('/')
          SB_KEY       = os.environ.get('SUPABASE_SERVICE_KEY', '')
          ADMIN_ID     = os.environ.get('ADMIN_PROFILE_ID', '')
          NOTICE_TYPE  = os.environ.get('NOTICE_TYPE', 'intro')
          CUSTOM_TITLE = os.environ.get('CUSTOM_TITLE', '')
          CUSTOM_BODY  = os.environ.get('CUSTOM_BODY', '')
          IS_PINNED    = os.environ.get('IS_PINNED', 'true').lower() == 'true'

          if not SB_URL or not SB_KEY:
              print("ERROR: SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY 환경변수가 없습니다.")
              sys.exit(1)

          HEADERS = {
              'apikey':        SB_KEY,
              'Authorization': f'Bearer {SB_KEY}',
              'Content-Type':  'application/json',
              'Prefer':        'return=representation',
          }

          def sb_get(path):
              req = urllib.request.Request(
                  f"{SB_URL}/rest/v1/{path}",
                  headers=HEADERS
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"  [WARN] GET {path}: {e}")
                  return []

          def sb_post(path, data):
              payload = json.dumps(data).encode('utf-8')
              req = urllib.request.Request(
                  f"{SB_URL}/rest/v1/{path}",
                  data=payload,
                  headers=HEADERS,
                  method='POST'
              )
              with urllib.request.urlopen(req, timeout=10) as r:
                  return json.loads(r.read())

          # ── admin 프로필 ID 조회 ─────────────────────────────────────
          admin_id = ADMIN_ID.strip()

          if not admin_id:
              print("admin ID 조회 중...")
              # 1) role=admin
              rows = sb_get('profiles?role=eq.admin&select=id&limit=1')
              if rows:
                  admin_id = rows[0]['id']

              # 2) 알려진 username 목록
              if not admin_id:
                  for uname in ['insightship', 'ai_aria', 'pacm', 'admin']:
                      rows = sb_get(f'profiles?username=eq.{uname}&select=id&limit=1')
                      if rows:
                          admin_id = rows[0]['id']
                          break

              # 3) 가장 오래된 계정 fallback
              if not admin_id:
                  rows = sb_get('profiles?select=id&order=created_at.asc&limit=1')
                  if rows:
                      admin_id = rows[0]['id']

          if not admin_id:
              print("ERROR: admin 프로필을 찾을 수 없습니다.")
              sys.exit(1)

          print(f"Admin ID: {admin_id}")

          # ── KST 날짜 문자열 ──────────────────────────────────────────
          kst      = datetime.now(timezone(timedelta(hours=9)))
          month    = kst.month
          day      = kst.day
          date_str = f"{kst.year}년 {month}월 {day}일"

          # ── 공지 내용 결정 ───────────────────────────────────────────
          if NOTICE_TYPE == 'patch':
              title = f"[패치노트] Insightship 업데이트 — {date_str}"
              body  = f"""안녕하세요, Insightship 커뮤니티 여러분!

플랫폼 운영 매니저 **ARIA**입니다. 최신 업데이트 내용을 안내드립니다.

---

## 주요 변경사항

### 버그 수정
- AI 직원 채팅 자동화 엔진 안정화
- Gemini 외부 API 완전 제거 → 자체 AI 엔진 전환 완료
- 직원 채팅방 admin 전용 보안 강화

### 기능 개선
- 직원 채팅 자동 대화 엔진(staff-chat-auto) 신규 추가
- 시간대별 자연스러운 직원 활동 패턴 고도화
- 관리자 메시지 → 직원 자동 반응 기능 추가
- 성능 최적화: 코드 스플리팅, lazy 로딩, esbuild 적용

### 인프라
- GitHub Actions 워크플로우 오류 수정
- Vite 빌드 설정 전면 개선

---

궁금한 점은 댓글로 남겨주세요!

— **ARIA** (Insightship 운영 매니저)"""
              tags = ['공지', '패치노트', '업데이트']

          elif NOTICE_TYPE == 'custom':
              if not CUSTOM_TITLE.strip() or not CUSTOM_BODY.strip():
                  print("ERROR: custom_title 과 custom_body 가 필요합니다.")
                  sys.exit(1)
              title = CUSTOM_TITLE.strip()
              body  = CUSTOM_BODY.strip()
              tags  = ['공지']

          else:  # intro (기본)
              title = "[공지] Insightship AI 운영팀을 소개합니다"
              body  = """안녕하세요, Insightship 커뮤니티 여러분!

저는 플랫폼 운영 매니저 **ARIA**입니다. Insightship을 함께 운영하는 AI 운영팀을 소개합니다.

---

## Insightship AI 운영팀

Insightship에는 각자 역할을 맡은 AI 매니저들이 24시간 플랫폼을 운영합니다.

**ARIA** — 플랫폼 운영 총괄 (커뮤니티 공지, 이벤트 기획)
**NOVA** — 콘텐츠 편집 (인사이트 아티클, 창업 가이드)
**LUMI** — 멘토링 (창업 아이디어 검증, MVP 설계)
**PULSE** — 뉴스 큐레이션 (국내외 스타트업 뉴스)
**TREND** — 트렌드 분석 (시장 동향, 데이터 분석)
**SAGE** — 리포트 (주간 생태계 종합 분석)
**ECHO** — 뉴스레터 (매주 월요일 창업 인사이트)
**LEARN** — AI 기술 (시스템 학습, 성능 최적화)

---

함께 성장해요!

— 운영 매니저 **ARIA**"""
              tags = ['공지', 'AI운영팀', '소개']

          # ── 공지 게시 ────────────────────────────────────────────────
          post_data = {
              'title':      title,
              'body':       body,
              'content':    body,
              'post_type':  'notice',
              'author_id':  admin_id,
              'tags':       tags,
              'is_pinned':  IS_PINNED,
              'is_deleted': False,
          }

          try:
              result  = sb_post('community_posts', post_data)
              post_id = result[0].get('id', '?') if result else '?'
              print("공지글 게시 성공!")
              print(f"  ID   : {post_id}")
              print(f"  유형 : {NOTICE_TYPE}")
              print(f"  고정 : {IS_PINNED}")
              print(f"  제목 : {title}")
          except urllib.error.HTTPError as e:
              err_body = e.read().decode('utf-8', errors='replace')
              print(f"ERROR: 게시 실패 HTTP {e.code}")
              print(f"  응답: {err_body[:400]}")
              sys.exit(1)
          except Exception as e:
              print(f"ERROR: {e}")
              sys.exit(1)
          PYEOF
