— 플랫폼 운영 매니저 **ARIA** 드림"""
              tags = ['공지', 'AI운영팀', '소개']

          # ── 공지 게시 ────────────────────────────────────────────────
          post_data = json.dumps({
              'title':      title,
              'body':       body,
              'content':    body,
              'post_type':  'notice',
              'author_id':  admin_id,
              'tags':       tags,
              'is_pinned':  IS_PINNED,
              'is_deleted': False,
          }).encode('utf-8')

          req = urllib.request.Request(
              f"{SB_URL}/rest/v1/community_posts",
              data=post_data,
              headers=headers,
              method='POST'
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  post_id = result[0].get('id', '?') if result else '?'
                  print(f"✅ 공지글 게시 성공!")
                  print(f"   ID    : {post_id}")
                  print(f"   유형  : {NOTICE_TYPE}")
                  print(f"   고정  : {IS_PINNED}")
                  print(f"   제목  : {title}")
          except urllib.error.HTTPError as e:
              body_err = e.read().decode()
              print(f"❌ 게시 실패: HTTP {e.code}")
              print(f"   응답: {body_err}")
              exit(1)

          PYEOF
