name: Insightship AI v4 — 자체 지속학습 엔진 (매일 KST 03:00)

on:
  schedule:
    - cron: '0 18 * * *'   # 매일 KST 03:00 (UTC 18:00)
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'full'
        type: choice
        options: [train, eval, batch, full]

jobs:
  ai-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: "📊 [AI v4] 현재 모델 성능 평가"
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=== Insightship AI v4 성능 평가 ==="
          python3 scripts/insightship_ai_v4.py eval
          echo "===================================="

      - name: "🧠 [AI v4] EMA 온라인 학습 (3000건)"
        if: ${{ github.event.inputs.mode != 'eval' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=== v4 EMA 지속 학습 시작 ==="
          python3 scripts/insightship_ai_v4.py train
          echo "=== 학습 완료 ==="

      - name: "⚡ [AI v4] 미요약 기사 배치 처리 + 카테고리 태깅"
        if: ${{ github.event.inputs.mode == 'batch' || github.event.inputs.mode == 'full' || github.event_name == 'schedule' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=== v4 배치 요약 + 카테고리 자동 태깅 ==="
          python3 scripts/insightship_ai_v4.py batch
          echo "=== 배치 완료 ==="

      - name: "💾 [AI v4] 학습 모델 자동 커밋"
        run: |
          git config user.name "Insightship AI Lab v4"
          git config user.email "ai-lab@insightship.pacm.kr"
          git add scripts/pacm_ai_model_v4.json || true
          git diff --staged --quiet || git commit -m "🧠 AI v4 모델 자동업데이트 $(date '+%Y-%m-%d')"
          git push || echo "변경 없음"
