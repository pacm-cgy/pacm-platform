name: 뉴스 자동 수집

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 UTC
  workflow_dispatch:      # 수동 실행

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 뉴스 수집 및 Supabase 저장
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PROFILE_ID: ${{ vars.ADMIN_PROFILE_ID }}
        run: |
          python3 - << 'PYEOF'
import urllib.request, urllib.parse, json, re, time, random, string, os
from datetime import datetime, timezone
from email.utils import parsedate_to_datetime

SUPABASE_URL = os.environ['SUPABASE_URL']
SERVICE_KEY  = os.environ['SUPABASE_SERVICE_KEY']
AUTHOR_ID    = os.environ['ADMIN_PROFILE_ID']

FEEDS = [
  ('https://news.google.com/rss/search?q=%EC%B2%AD%EC%86%8C%EB%85%84+%EC%B0%BD%EC%97%85&hl=ko&gl=KR&ceid=KR:ko', '청소년창업'),
  ('https://news.google.com/rss/search?q=%EC%8A%A4%ED%83%80%ED%8A%B8%EC%97%85+%ED%88%AC%EC%9E%90&hl=ko&gl=KR&ceid=KR:ko', '스타트업투자'),
  ('https://news.google.com/rss/search?q=%EC%B0%BD%EC%97%85+%EC%9D%B8%EC%82%AC%EC%9D%B4%ED%8A%B8&hl=ko&gl=KR&ceid=KR:ko', '창업인사이트'),
  ('https://news.google.com/rss/search?q=AI+%EC%8A%A4%ED%83%80%ED%8A%B8%EC%97%85&hl=ko&gl=KR&ceid=KR:ko', 'AI스타트업'),
  ('https://news.google.com/rss/search?q=%EC%9C%A0%EB%8B%88%EC%BD%98+%EC%8A%A4%ED%83%80%ED%8A%B8%EC%97%85&hl=ko&gl=KR&ceid=KR:ko', '유니콘'),
  ('https://news.google.com/rss/search?q=%EC%8A%A4%ED%83%80%ED%8A%B8%EC%97%85+%EC%84%B1%EA%B3%B5&hl=ko&gl=KR&ceid=KR:ko', '성공사례'),
]

def strip_html(s):
    if not s: return ''
    s = re.sub(r'<[^>]+>', ' ', s)
    for e,r in [('&nbsp;',' '),('&amp;','&'),('&lt;','<'),('&gt;','>'),('&quot;','"'),('&#39;',"'"),('\xa0',' ')]:
        s = s.replace(e, r)
    s = re.sub(r'&#[0-9]+;', '', s)
    return re.sub(r'\s+', ' ', s).strip()

def parse_google_desc(raw):
    src_m = re.search(r'<font[^>]*color="#6f6f6f"[^>]*>([\s\S]+?)</font>', raw, re.I)
    source = strip_html(src_m.group(1)) if src_m else None
    a_m = re.search(r'<a[^>]+>([\s\S]+?)</a>', raw)
    text = strip_html(a_m.group(1)) if a_m else strip_html(raw)
    return text[:300], source

def make_slug():
    r = ''.join(random.choices(string.ascii_lowercase+string.digits, k=6))
    return f"news-{int(time.time()*1000)}-{r}"

def supa_req(path, method='GET', body=None):
    url = f"{SUPABASE_URL}/rest/v1{path}"
    hdrs = {'apikey': SERVICE_KEY, 'Authorization': f'Bearer {SERVICE_KEY}',
            'Content-Type': 'application/json', 'Prefer': 'return=minimal'}
    data = json.dumps(body).encode() if body else None
    req = urllib.request.Request(url, data=data, headers=hdrs, method=method)
    with urllib.request.urlopen(req, timeout=10) as r:
        return r.status, r.read().decode()

def article_exists(link):
    try:
        url = f"{SUPABASE_URL}/rest/v1/articles?source_url=eq.{urllib.parse.quote(link,safe='')}&select=id&limit=1"
        req = urllib.request.Request(url, headers={'apikey': SERVICE_KEY, 'Authorization': f'Bearer {SERVICE_KEY}'})
        with urllib.request.urlopen(req, timeout=5) as r:
            return bool(json.loads(r.read()))
    except: return False

inserted = skipped = errors = 0

for feed_url, tag in FEEDS:
    try:
        req = urllib.request.Request(feed_url, headers={'User-Agent': 'InsightshipBot/1.0'})
        with urllib.request.urlopen(req, timeout=15) as r:
            xml = r.read().decode('utf-8', errors='replace')
    except Exception as e:
        print(f"RSS 오류 {tag}: {e}"); continue

    for item_m in re.finditer(r'<item>([\s\S]*?)</item>', xml):
        block = item_m.group(1)

        def get_tag(t):
            m = re.search(rf'<{t}[^>]*>(?:<!\[CDATA\[([\s\S]*?)\]\]>|([\s\S]*?))</{t}>', block)
            return (m.group(1) or m.group(2) or '').strip() if m else ''

        raw_title = get_tag('title')
        link = get_tag('link') or get_tag('guid')
        if not raw_title or not link: continue

        clean_title = re.sub(r' - [^-]+$', '', raw_title).strip()[:200]
        raw_desc = get_tag('description')
        excerpt_text, desc_source = parse_google_desc(raw_desc) if raw_desc else ('', None)

        src_m = re.search(r'<source[^>]*url="[^"]*"[^>]*>([\s\S]*?)</source>', block)
        source_name = (strip_html(src_m.group(1)) if src_m else None) or desc_source or '뉴스'

        excerpt = excerpt_text if (excerpt_text and excerpt_text != clean_title) else clean_title

        if article_exists(link):
            skipped += 1; continue

        pub_date = get_tag('pubDate')
        try: pub_iso = parsedate_to_datetime(pub_date).isoformat()
        except: pub_iso = datetime.now(timezone.utc).isoformat()

        article = {
            'title': clean_title, 'slug': make_slug(),
            'excerpt': excerpt, 'body': f"{excerpt}\n\n원문 보기: {link}",
            'category': 'news', 'status': 'published', 'author_id': AUTHOR_ID,
            'read_time': 2, 'source_name': source_name, 'source_url': link,
            'published_at': pub_iso, 'tags': ['뉴스', tag], 'featured': False,
        }
        try:
            status, resp = supa_req('/articles', 'POST', article)
            if status == 201: inserted += 1
            else: errors += 1; print(f"오류: {resp[:80]}")
        except Exception as e:
            errors += 1; print(f"예외: {e}")

print(f"✅ 완료: inserted={inserted}, skipped={skipped}, errors={errors}")
PYEOF
