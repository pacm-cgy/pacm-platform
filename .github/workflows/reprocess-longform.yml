          def build_longform(title, body):
              clean_body = clean_text(body or '')
              evt  = detect_event(title, clean_body)
              dom  = detect_domain(title, clean_body)
              sents = [s for s in split_sentences(clean_body)
                       if not re.search(r'무단\s*(전재|배포|복제)|copyright|구독|광고|협찬', s, re.I)]

              # 핵심 문장 추출
              title_toks = set(tokenize(title))
              scored = []
              for i, s in enumerate(sents):
                  stoks = tokenize(s)
                  overlap = sum(1 for t in stoks if t in title_toks)
                  pos_b = 1.5 if i < 3 else 1.2 if i < 6 else 1.0
                  num_b = 1.6 if re.search(r'[\d,]+억|[\d,]+조|\d+%|\d+배', s) else 1.0
                  cau_b = 1.3 if re.search(r'때문에|이유로|배경에는|결과로|따라서', s) else 1.0
                  len_b = 1.2 if 30 <= len(s) <= 200 else 1.0
                  scored.append((s, (overlap + 1) * pos_b * num_b * cau_b * len_b, i))
              scored.sort(key=lambda x: -x[1])
              key_sents = [x[0] for x in sorted(scored[:6], key=lambda x: x[2])]

              nums     = extract_numbers(title + ' ' + clean_body)
              dom_ctx  = DOMAIN_CONTEXT.get(dom, DOMAIN_CONTEXT['startup'])
              narr     = EVENT_NARRATIVE.get(evt, EVENT_NARRATIVE['general'])
              deep_q   = DEEP_QUESTIONS.get(evt, DEEP_QUESTIONS['general'])
              evt_info = EVENT_TYPES.get(evt, EVENT_TYPES.get('market', {'label':'주요 소식','emoji':'📰'}))
              dom_ko   = DOMAINS.get(dom, {}).get('ko', '창업·비즈니스')

              # 용어 설명
              used_terms = []
              combined = title + ' ' + clean_body
              for term, (short, long_) in TERM_DICT.items():
                  if term in combined:
                      used_terms.append((short, long_))
                  if len(used_terms) >= 4:
                      break

              lines = []
              # §1 리드
              lines.append(f"## {evt_info['emoji']} {evt_info['label']}")
              lines.append('')
              lines.append(f"**지금 이 순간, {dom_ko} 생태계에서 주목할 만한 일이 벌어지고 있습니다.**")
              lines.append('')
              if nums:
                  lines.append(f"이번 소식의 핵심은 {nums[0]} 규모의 움직임입니다. 이는 시장이 이 분야의 가능성을 인정했다는 강력한 신호입니다.")
              else:
                  lines.append("이번 소식은 창업·비즈니스 생태계에 중요한 변화를 알리고 있습니다.")
              lines.append('')
              if key_sents:
                  lines.append(f"> {key_sents[0]}")
                  lines.append('')
                  if len(key_sents) > 1:
                      lines.append(key_sents[1])
                      lines.append('')

              # §2 핵심 분석
              lines.append('---')
              lines.append('')
              lines.append('## 📌 핵심 사실 분석')
              lines.append('')
              lines.append(narr['whyItMatters'])
              lines.append('')
              if nums:
                  lines.append('**이번 소식의 주요 수치:**')
                  lines.append('')
                  for n in nums:
                      lines.append(f"• **{n}** — 이 수치가 의미하는 것은 시장의 규모와 성장 속도입니다.")
                  lines.append('')
              if len(key_sents) > 2:
                  lines.append('**현장에서 전해진 내용:**')
                  lines.append('')
                  for s in key_sents[2:4]:
                      lines.append(f"> {s}")
                      lines.append('')

              # §3 심층 배경
              lines.append('---')
              lines.append('')
              lines.append('## 🔍 왜 지금 이 뉴스가 중요한가')
              lines.append('')
              lines.append(dom_ctx['background'])
              lines.append('')
              lines.append('**지금 이 분야의 트렌드:**')
              lines.append('')
              lines.append(dom_ctx['trend'])
              lines.append('')

              # §4 용어 설명
              if used_terms:
                  lines.append('---')
                  lines.append('')
                  lines.append('## 📚 핵심 개념 이해하기')
                  lines.append('')
                  lines.append('*이 뉴스를 제대로 읽으려면 전문 용어를 알아야 합니다.*')
                  lines.append('')
                  for short, long_ in used_terms:
                      lines.append(f"**{short}**")
                      lines.append('')
                      lines.append(long_)
                      lines.append('')

              # §5 창업가 시선
              lines.append('---')
              lines.append('')
              lines.append('## 💡 창업가의 시선으로 읽기')
              lines.append('')
              lines.append('*이 뉴스를 그냥 "정보"로 읽으면 금방 잊습니다. 창업가의 시선으로 읽으면 인사이트가 됩니다.*')
              lines.append('')
              lines.append(f"**핵심 질문:** {narr['keyQuestion']}")
              lines.append('')
              lines.append(dom_ctx['implication'])
              lines.append('')
              lines.append('**지금 바로 해볼 수 있는 것:**')
              lines.append('')
              lines.append(f"→ {narr['actionPoint']}")
              lines.append('')

              # §6 깊이 생각하기
              lines.append('---')
              lines.append('')
              lines.append('## 💭 더 깊이 생각해볼 질문')
              lines.append('')
              lines.append('이 뉴스를 읽고 다음 질문들을 스스로에게 던져보세요.')
              lines.append('')
              for q in deep_q:
                  lines.append(f"• {q}")
              lines.append('')
              lines.append('*매일 한 개의 뉴스를 이렇게 깊이 읽는 습관이 미래 창업가를 만듭니다.*')
              lines.append('')
              lines.append(f"*insightship-nlp · {dom} · {evt}*")

              return '\n'.join(lines)

          # ──────────────────────────────────────────────────────────
          # Supabase 헬퍼
          # ──────────────────────────────────────────────────────────
          def sb_get(path, params=''):
              url = f"{SB_URL}/rest/v1/{path}?{params}"
              req = urllib.request.Request(url, headers={**H, 'Prefer':'count=exact'})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read()), r.headers.get('content-range','')

          def sb_patch(path, data):
              url = f"{SB_URL}/rest/v1/{path}"
              req = urllib.request.Request(url, data=json.dumps(data).encode(),
                                           headers={**H,'Prefer':'return=minimal'}, method='PATCH')
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return r.status
              except urllib.error.HTTPError as e:
                  return e.code

          # ──────────────────────────────────────────────────────────
          # 메인 루프
          # ──────────────────────────────────────────────────────────
          total_done = 0
          total_fail = 0

          for rnd in range(1, ROUNDS + 1):
              # 500자 미만 요약 기사 조회
              try:
                  arts, cr = sb_get('articles',
                      f"status=eq.published&source_name=not.is.null"
                      f"&select=id,title,body,excerpt,ai_summary"
                      f"&order=published_at.desc&limit={BATCH}")
              except Exception as e:
                  print(f"[R{rnd}] 조회 실패: {e}")
                  break

              if not isinstance(arts, list) or not arts:
                  print(f"[R{rnd}] 기사 없음 — 완료")
                  break

              # 롱폼이 아닌 것 필터 (500자 미만 또는 ## 섹션 없는 것)
              pending = [a for a in arts if len(a.get('ai_summary') or '') < 500 or '##' not in (a.get('ai_summary') or '')]
              if not pending:
                  print(f"[R{rnd}] 모두 롱폼 완료 — 종료")
                  break

              done, fail = 0, 0
              for a in pending:
                  art_id = a['id']
                  title  = a.get('title') or ''
                  body   = a.get('body') or a.get('excerpt') or title

                  if not title:
                      fail += 1; continue

                  try:
                      summary = build_longform(title, body)
                      evt     = detect_event(title, clean_text(body))
                      dom     = detect_domain(title, clean_text(body))
                      cat     = map_category(dom, evt)
                      read_t  = max(3, len(summary) // 350)

                      status = sb_patch(
                          f"articles?id=eq.{art_id}",
                          {'ai_summary': summary, 'ai_processed_at': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
                           'ai_category': dom, 'category': cat, 'read_time': read_t}
                      )
                      if status in (200, 204):
                          done += 1
                      else:
                          fail += 1
                          if fail <= 3:
                              print(f"  PATCH 실패 {status}: {art_id}")
                  except Exception as e:
                      fail += 1
                      if fail <= 3:
                          print(f"  처리 오류: {e}")

              total_done += done
              total_fail += fail
              print(f"[R{rnd}/{ROUNDS}] 처리 {len(pending)}건 → 성공 {done} / 실패 {fail} | 누적 성공 {total_done}")

              if len(pending) < BATCH:
                  print("✅ 마지막 배치 완료")
                  break
              time.sleep(2)

          print(f"\n=== 롱폼 v8 재처리 완료 ===")
          print(f"총 성공: {total_done}건 | 총 실패: {total_fail}건")

          PYEOF
