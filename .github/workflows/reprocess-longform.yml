name: 🔄 롱폼 AI v9 재처리 — 기사 인사이트 분석

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '실행 확인 (yes 입력)'
        required: true
        default: 'no'
      batch_size:
        description: '배치 크기 (기본 80, 최대 100)'
        required: false
        default: '80'
      rounds:
        description: '반복 실행 횟수 (기본 20회 = 최대 1600개 처리)'
        required: false
        default: '20'

jobs:
  reprocess-longform:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: 🔄 롱폼 v9 재처리 실행
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          BATCH_SIZE:           ${{ github.event.inputs.batch_size }}
          ROUNDS:               ${{ github.event.inputs.rounds }}
        run: python3 scripts/reprocess_longform.py
