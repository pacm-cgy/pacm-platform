name: 🔄 롱폼 AI v8 재처리 — 기존 기사 업그레이드

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '실행 확인 (yes 입력)'
        required: true
        default: 'no'
      batch_size:
        description: '배치 크기 (기본 80, 최대 100)'
        required: false
        default: '80'
      rounds:
        description: '반복 실행 횟수 (기본 20회 = 최대 1600개 처리)'
        required: false
        default: '20'

jobs:
  reprocess-longform:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: 🔄 롱폼 v8 재처리 실행
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          ROUNDS: ${{ github.event.inputs.rounds }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, urllib.error, json, re, time

          SB_URL   = os.environ.get('SUPABASE_URL', '').rstrip('/')
          SB_KEY   = os.environ.get('SUPABASE_SERVICE_KEY', '')
          BATCH    = int(os.environ.get('BATCH_SIZE', '80'))
          ROUNDS   = int(os.environ.get('ROUNDS', '20'))

          if not SB_URL or not SB_KEY:
              print("❌ 환경변수 없음")
              exit(1)

          H = {
              'apikey': SB_KEY,
              'Authorization': f'Bearer {SB_KEY}',
              'Content-Type': 'application/json',
          }

          # ──────────────────────────────────────────────────────────
          # 텍스트 정제
          # ──────────────────────────────────────────────────────────
          def clean_text(text):
              if not text:
                  return ''
              text = re.sub(r'<(script|style)[^>]*>[\s\S]*?</(script|style)>', '', text, flags=re.I)
              text = re.sub(r'<[^>]+>', ' ', text)
              text = text.replace('&nbsp;', ' ').replace('&amp;', '&').replace('&lt;', '<')
              text = text.replace('&gt;', '>').replace('&quot;', '"').replace('&#39;', "'")
              text = re.sub(r'https?://\S+', '', text)
              text = re.sub(r'공유하기|페이스북|트위터|카카오|무단전재|재배포\s*금지', '', text)
              text = re.sub(r'\s{2,}', ' ', text).strip()
              return text

          def split_sentences(text):
              text = re.sub(r'([.!?])\s+', r'\1\n', text)
              text = re.sub(r'([다요임음])\s+', r'\1\n', text)
              sents = [s.strip() for s in text.split('\n')]
              return [s for s in sents if 15 <= len(s) <= 350]

          STOPWORDS = set('이 그 저 것 수 들 및 등 에서 로서 으로 에게 하지만 그러나 또한 그리고 따라서 때문에 위해 통해 있는 없는 되는 하는 있다 없다 된다 한다 이다 있으며 되며 하며 이번 지난 올해 작년 최근 현재 특히 또 더 가장 매우 모두 함께 이미 아직 약 총 기자 특파원 뉴스 보도 발표 밝혔다 말했다 전했다'.split())

          def tokenize(text):
              if not text: return []
              tokens = re.findall(r'[가-힣]{2,}|[a-z]{3,}|[0-9]+', text.lower())
              return [t for t in tokens if t not in STOPWORDS and len(t) >= 2]

          # ──────────────────────────────────────────────────────────
          # 분류기
          # ──────────────────────────────────────────────────────────
          EVENT_TYPES = {
              'funding':     {'kw': ['투자','펀딩','시리즈','유치','억원','조원','라운드','시드','VC','엔젤'], 'label':'투자 유치','emoji':'💰'},
              'product':     {'kw': ['출시','론칭','선보','공개','베타','서비스','앱','플랫폼','오픈'], 'label':'제품/서비스 출시','emoji':'🚀'},
              'policy':      {'kw': ['정부','지원','공모','선발','과기부','중기부','창진원','예산','규제','정책','공고','모집'], 'label':'정책/지원','emoji':'📋'},
              'acquisition': {'kw': ['인수','합병','M&A','지분','매각'], 'label':'인수/합병','emoji':'🤝'},
              'research':    {'kw': ['연구','논문','결과','조사','분석','보고서','통계'], 'label':'연구/조사','emoji':'🔬'},
              'person':      {'kw': ['대표','CEO','창업자','설립자','인터뷰','스토리','수상'], 'label':'창업가 스토리','emoji':'👤'},
              'market':      {'kw': ['시장','성장','규모','트렌드','전망','예측','확대','글로벌'], 'label':'시장/트렌드','emoji':'📊'},
          }
          DOMAINS = {
              'investment': {'kw':['투자','펀딩','시리즈A','시리즈B','억원','조원','VC','벤처'],'ko':'투자·금융','cat':'trend'},
              'tech':       {'kw':['AI','인공지능','딥러닝','반도체','GPU','클라우드','SaaS'],'ko':'기술·AI','cat':'trend'},
              'youth':      {'kw':['청소년','청년','대학생','고등학생','창업교육','해커톤','비즈쿨'],'ko':'청소년·교육','cat':'insight'},
              'policy':     {'kw':['정부','지원','공모','과기부','중기부','창진원'],'ko':'정책·지원','cat':'insight'},
              'esg':        {'kw':['ESG','탄소중립','친환경','임팩트','소셜벤처'],'ko':'ESG·임팩트','cat':'insight'},
              'startup':    {'kw':['스타트업','창업','유니콘','피봇','글로벌'],'ko':'창업·비즈니스','cat':'news'},
              'edutech':    {'kw':['에듀테크','교육플랫폼','학습','온라인교육'],'ko':'에듀테크','cat':'insight'},
              'fintech':    {'kw':['핀테크','결제','금융','블록체인'],'ko':'핀테크','cat':'trend'},
              'health':     {'kw':['헬스케어','의료','바이오','건강'],'ko':'헬스케어','cat':'trend'},
              'climate':    {'kw':['기후','탄소','친환경','에너지','태양광','수소'],'ko':'기후·에너지','cat':'insight'},
          }

          def detect_event(title, body):
              text = (title + ' ' + (body or '')[:500]).lower()
              priority = ['funding','acquisition','product','policy','research','person','market']
              scores = {}
              for t in priority:
                  kw = EVENT_TYPES[t]['kw']
                  scores[t] = sum(1 for k in kw if k.lower() in text)
                  scores[t] += sum(1 for k in kw if k.lower() in title.lower())
              best = max(priority, key=lambda t: scores[t])
              return best if scores[best] > 0 else 'general'

          def detect_domain(title, body):
              text = (title + ' ' + (body or '')[:800]).lower()
              best, best_score = 'startup', 0
              for domain, info in DOMAINS.items():
                  score = sum(1 for k in info['kw'] if k.lower() in text)
                  if score > best_score:
                      best, best_score = domain, score
              return best

          def map_category(domain, evt):
              if evt in ('policy',) or domain in ('youth','policy'): return 'insight'
              if evt in ('funding','market'): return 'trend'
              if evt == 'person': return 'magazine'
              return DOMAINS.get(domain, {}).get('cat', 'news')

          def extract_numbers(text):
              patterns = [r'[\d,]+억\s*원', r'[\d,]+조\s*원', r'[\d,]+만\s*원', r'\d+\s*%', r'\d+\s*배', r'[\d,]+만\s*명']
              nums = []
              for p in patterns:
                  nums.extend(re.findall(p, text))
              return list(dict.fromkeys(nums))[:5]

          # ──────────────────────────────────────────────────────────
          # 배경지식 데이터베이스
          # ──────────────────────────────────────────────────────────
          DOMAIN_CONTEXT = {
              'investment': {
                  'background': '스타트업 투자 생태계는 엔젤투자 → 시드 → 시리즈A → 시리즈B → 시리즈C → 프리IPO → IPO 순서로 성장합니다. 각 단계마다 기업이 증명해야 할 것이 다릅니다. 시드 단계에서는 팀과 아이디어를, 시리즈A에서는 PMF(제품-시장 적합성)를, 시리즈B 이상에서는 스케일업 가능성을 보여줘야 합니다.',
                  'trend': '2024~2025년 글로벌 스타트업 투자 시장은 AI, 클린테크, 바이오 분야에 집중되고 있습니다. 금리가 높아지면서 "흑자 성장"을 요구하는 투자자가 늘었고, 과거처럼 성장만 내세우는 스타트업은 투자받기 어려워졌습니다.',
                  'implication': '투자 유치는 단순히 돈을 받는 것이 아닙니다. 투자자는 창업가의 비전을 검증해주는 파트너이자, 네트워크와 경험을 함께 제공하는 조언자입니다. "왜 이 투자자인가"가 중요합니다. 단순히 돈이 많은 투자자보다, 내 사업 분야를 잘 아는 투자자를 찾는 것이 장기적으로 유리합니다.',
              },
              'tech': {
                  'background': '기술 혁신은 S자 곡선을 그립니다. 초기에는 느리게 성장하다가 어느 순간 폭발적으로 확산됩니다. 스마트폰이 그랬고, 소셜미디어가 그랬으며, 이제 AI가 그 변곡점을 지나고 있습니다. 중요한 것은 기술 자체가 아니라 "그 기술이 해결하는 문제"입니다.',
                  'trend': 'AI 기술은 의료, 금융, 교육, 제조, 물류 등 거의 모든 산업에 침투하고 있습니다. 특히 생성형 AI의 등장으로 텍스트, 이미지, 코드 생성이 자동화되면서 많은 직업이 변화하고 있습니다. AI를 핵심 역량으로 내재화한 기업과 그렇지 않은 기업 사이의 격차가 빠르게 벌어지고 있습니다.',
                  'implication': '기술을 배우는 것보다 기술로 문제를 해결하는 능력이 중요합니다. 성공한 기술 창업가들은 "가장 최신 기술"이 아니라 "고객의 가장 큰 불편함"을 먼저 찾습니다. 지금 당장 주변에서 반복적으로 불편하다고 느끼는 것을 기록해보세요.',
