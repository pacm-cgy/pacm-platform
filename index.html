  <!-- 크리티컬 CSS 인라인 (FCP 개선) -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
    body{
      font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#050505;color:#F0F0F0;line-height:1.6;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      overflow-x:hidden;min-height:100vh;text-rendering:optimizeLegibility
    }
    #root{min-height:100vh}
    /* 초기 로더 (JS 번들 로딩 전 FCP 개선) */
    #root:empty{
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;flex-direction:column;gap:16px
    }
    #root:empty::before{
      content:'INSIGHTSHIP';
      font-size:11px;letter-spacing:4px;color:#3B82F6;
      font-family:'JetBrains Mono',monospace;
      animation:pulse 1.4s ease-in-out infinite
    }
    #root:empty::after{
      content:'';display:block;
      width:28px;height:28px;
      border:2px solid rgba(59,130,246,0.15);
      border-top:2px solid #3B82F6;
      border-radius:50%;animation:spin .7s linear infinite
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    /* 레이아웃 기초 */
    .app-layout{display:flex;flex-direction:column;min-height:100vh}
    .main-content-area{flex:1;width:100%}
    /* 이미지 lazy load 기본 */
    img{max-width:100%;height:auto;display:block}
    img[loading="lazy"]{content-visibility:auto}
  </style>

  <script>
    // 다크모드 강제 적용 (깜빡임 방지 — JS 번들 이전 즉시 실행)
    document.documentElement.setAttribute('data-theme', 'dark')
    try { localStorage.removeItem('theme') } catch(e) {}
  </script>

  <script>
    // 보안: DevTools 남용 방지 + 외부 스크립트 주입 감지
    (function() {
      // 우클릭 방지
      document.addEventListener('contextmenu', function(e) { e.preventDefault() }, true)
      // F12, Ctrl+Shift+I/J/C, Ctrl+U 방지
      document.addEventListener('keydown', function(e) {
        var k = e.key || e.keyCode
        if (k === 'F12' || k === 123) { e.preventDefault(); return false }
        if (e.ctrlKey && e.shiftKey && /^[IJCijc]$/.test(k)) { e.preventDefault(); return false }
        if (e.ctrlKey && /^[Uu]$/.test(k)) { e.preventDefault(); return false }
      }, true)
      // DevTools 탐지
      var _devOpen = false
      setInterval(function() {
        var open = window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160
        if (open && !_devOpen) {
          _devOpen = true
          console.clear()
          console.log('%c🔒 Insightship', 'font-size:22px;color:#3B82F6;font-weight:bold')
          console.log('%c개발자 전용 콘솔입니다. 악의적 코드 삽입은 법적 처벌을 받을 수 있습니다.', 'font-size:12px;color:#f87171')
        } else if (!open) { _devOpen = false }
      }, 1500)
      // 외부 스크립트 주입 차단
      if (typeof MutationObserver !== 'undefined') {
        new MutationObserver(function(muts) {
          muts.forEach(function(m) {
            m.addedNodes.forEach(function(n) {
              if (n.tagName === 'SCRIPT' && n.src && !n.src.includes(location.hostname)) {
                n.remove()
              }
            })
          })
        }).observe(document.documentElement, { childList: true, subtree: true })
      }
    })()
  </script>

  <script>
    // Service Worker v6 등록
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/', updateViaCache: 'none' })
          .then(function(reg) {
            // 즉시 업데이트 체크
            reg.update().catch(function() {})
            // 새 SW 감지 → 자동 적용
            reg.addEventListener('updatefound', function() {
              var nw = reg.installing
              if (!nw) return
              nw.addEventListener('statechange', function() {
                if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                  nw.postMessage({ type: 'SKIP_WAITING' })
                }
              })
            })
          }).catch(function() {})
        // SW 컨트롤러 변경 시 새로고침 (새 버전 즉시 반영)
        var _refreshing = false
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!_refreshing) { _refreshing = true; window.location.reload() }
        })
        // 구버전 캐시 정리 (v5 이하)
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.filter(function(k) {
              return !k.includes('-v6') && k.includes('insightship')
            }).forEach(function(k) { caches.delete(k) })
          })
        }
      })
    }
  </script>
